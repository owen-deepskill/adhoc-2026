- start: 00:04:09:17
  end: 00:04:14:01
  text_en: And that empirical term, is really only very, very recent.
  text_ko: 그리고 그 경험적 용어는 사실 아주 최근에 생긴 개념입니다.
- start: 00:04:14:01
  end: 00:04:16:04
  text_en: And so one of the things that
  text_ko: 그래서 우리가 해야 했던 일 중 하나는 사람들이 어떻게
- start: 00:04:16:04
  end: 00:04:19:06
  text_en: we had to do, beyond was to go look at
  text_ko: 그래서 우리가 해야 했던 일 중 하나는 사람들이 어떻게 논쟁하는지 살펴보는 것이었습니다. 사소하게 들릴
- start: 00:04:19:06
  end: 00:04:24:21
  text_en: how people argue. And that sounds kind of trivial, but one of the, one of the challenges is
  text_ko: 논쟁하는지 살펴보는 것이었습니다. 사소하게 들릴 수도 있지만, 특히 컴퓨터 환경에서 이를 수행하려면
