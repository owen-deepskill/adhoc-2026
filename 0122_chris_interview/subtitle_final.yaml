  text_en: in which people, produce well-reasoned, well-thought through
  text_ko: 왔습니다. 사람들이 어떻게 논리적이고 심사숙고된 언어적 표현을 만들어내는지 이해하려고
- start: 00:01:54:23
  end: 00:02:00:03
  text_en: pieces of linguistic material. And so the focus is
  text_ko: 표현을 만들어내는지 이해하려고 노력해 온 것이죠. 따라서 제
- start: 00:02:00:03
  end: 00:02:15:12
  text_en: very much on the performance of argumentation and the reaching of solidly justified decisions.
  text_ko: 노력해 온 것이죠. 따라서 제 연구의 핵심은 논증의 수행과 타당성을 갖춘 결론에 도달하는 과정에 있습니다. 고려해야 할 사항이 많습니다. 사람들이 논쟁하거나 의견이 다를 때, 그들은 자신의 반대 의견을 표현하고
- start: 00:02:15:14
  end: 00:02:17:09
