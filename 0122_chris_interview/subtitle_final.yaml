- start: 00:03:44:22
  end: 00:03:47:14
  text_en: There's not a lot of rule.
  text_ko: 규칙이 많지 않아요.
- start: 00:03:47:14
  end: 00:03:51:14
  text_en: And this was a problem from very early on because there's a lot of,
  text_ko: 네. 그리고 이건 아주 초창기부터 문제였는데,
