  text_en: So, we have Professor Chris Reed from the University of Dundee
  text_ko: 오늘은 던디 대학교의 크리스 리드 교수님께서 자신의 연구와 이 접근 방식을 실제 응용 분야에 어떻게 적용할 수 있는지에
