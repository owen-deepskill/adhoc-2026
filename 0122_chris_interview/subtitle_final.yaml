- start: 00:00:29:14
  end: 00:00:32:00
  text_en: with a group of people. So we have been following
  text_ko: 우리는 지난 2000년 동안 이러한 논리적 규칙을
- start: 00:00:32:00
  end: 00:00:36:04
  text_en: these rules, rules of the logic, for last,
  text_ko: 우리는 지난 2000년 동안 이러한 논리적 규칙을 따라왔습니다. 그리고 저는 바로 이 두 가지 철학적 접근
- start: 00:00:36:04
  end: 00:00:40:03
  text_en: last 2000 years. And I found that there is exactly at the intersection
  text_ko: 따라왔습니다. 그리고 저는 바로 이 두 가지 철학적 접근 방식이 교차하는 지점에 기술적 접근 방식이 있다는 것을 발견했습니다.
