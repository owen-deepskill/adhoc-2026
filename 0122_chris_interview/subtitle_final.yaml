- start: 00:42:08:20
  end: 00:42:12:08
  text_en: And then you've got some the mixture of the
  text_ko: 그리고 두 가지를 혼합한 방식도 있죠.
- start: 00:42:12:08
  end: 00:42:18:06
  text_en: two. So, so the idea is that, depending on your compute availability,
  text_ko: 그러니까, 컴퓨팅 자원의 가용성,
- start: 00:42:18:06
  end: 00:42:21:05
  text_en: depending on the task problems, depending
  text_ko: 과업의 복잡성, 그리고 활용 가능한
- start: 00:42:21:05
  end: 00:42:23:19
  text_en: on the complexity of the text, if you, depending on what other algorithms
  text_ko: 다른 알고리즘에 따라 다양한 파이프라인 조합을
- start: 00:42:23:19
  end: 00:42:26:12
  text_en: you've got to hand, you might choose different
  text_ko: 선택할 수 있다는 겁니다.
- start: 00:42:26:12
  end: 00:42:31:05
  text_en: combinations of different pipelines, but all within a common, language, a
  text_ko: 하지만 이 모든 것은 개방적이고 확장 가능한 공통 언어와 프레임워크 내에서 이루어집니다.
- start: 00:42:31:05
  end: 00:42:36:10
  text_en: common framework that is kind of open and extensible. So I think that's maybe,
  text_ko: 이것이 바로 두 가지 전략을
- start: 00:42:36:12
  end: 00:42:42:10
  text_en: an example, at least in approach, to being able to merge these two strategies.
  text_ko: 결합하는 한 가지 예시라고 할 수 있겠네요.
- start: 00:42:42:10
  end: 00:42:46:04
  text_en: And I think that applications that do this and you know, applications that go out
  text_ko: 그리고 제 생각에는 이런 기능을 하는 적용 분야,
- start: 00:42:46:04
  end: 00:42:56:03
  text_en: to the general public, are probably not far behind as a result of that.
  text_ko: 즉 일반 대중에게 제공되는 분야에도 그 결과로 머지않아 나올 것 같습니다.
- start: 00:42:56:05
  end: 00:42:59:03
  text_en: Segueing to the next question, which is kind of how you can
  text_ko: 다음 질문으로 연결될 것 같은데요.
- start: 00:42:59:03
  end: 00:43:03:20
  text_en: sort of, the any further application of this or what we discussed, like
  text_ko: 우리가 논의했던 논증 기술을 어떻게 더 발전시켜
- start: 00:43:03:20
  end: 00:43:05:23
  text_en: argumentation technology.
  text_ko: 적용할 수 있을지 궁금합니다.
- start: 00:43:05:23
  end: 00:43:11:19
  text_en: You have been working on some sectors, but looks like they're happy, some unconquered territory, like the, the
  text_ko: 이미 여러 분야에서 연구를 진행해 오셨지만, 기업 의사 결정과 같은
  caption: "Future Applications: Corporate Decision Making / 미래 응용: 기업 의사결정"
- start: 00:43:11:19
  end: 00:43:13:08
  text_en: corporate decision making, and they're working with
  text_ko: 미개척 분야가 있는 것 같습니다.
- start: 00:43:13:08
  end: 00:43:15:17
  text_en: you. I just wonder how you vision for
  text_ko: 앞으로의 방향에 대한 비전을 말씀해
- start: 00:43:15:17
  end: 00:43:18:17
