  end: 00:03:57:03
  text_en: kind of 20th century philosophy, focusing on the structure of argumentation.
  text_ko: 20세기 철학에서 논증의 구조에 초점을 맞춘 부분이 많았기 때문입니다.
- start: 00:03:57:03
  end: 00:03:59:03
  text_en: But most of that is conducted
