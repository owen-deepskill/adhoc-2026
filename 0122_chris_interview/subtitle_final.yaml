  text_en: then you need tools. You need infrastructure.
  text_ko: 도구와 인프라가 필요하다는 점이 어려운 과제 중 하나였습니다.
- start: 00:04:30:11
  end: 00:04:35:02
  text_en: You need to be able to bring that data together, to analyze it, to annotate it.
  text_ko: 데이터를 수집하고 분석하고 주석을 달 수 있어야 합니다.
