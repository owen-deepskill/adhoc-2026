  text_ko: 의견이 다를 때, 그들은 자신의 반대 의견을 표현하고
- start: 00:02:17:09
  end: 00:02:19:22
  text_en: they come into conflict. And when they try to resolve
  text_ko: 의견이 다를 때, 그들은 자신의 반대 의견을 표현하고 갈등을 겪게 됩니다. 그리고 그 갈등을 합의된 해결책으로
