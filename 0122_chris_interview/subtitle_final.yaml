  end: 00:38:57:00
  text_en: limitation for us, how to combine the other components to overcome the limit.
  text_ko: 다른 구성 요소들을 어떻게 결합해야 한계를 극복할 수 있을지 말이죠.
- start: 00:38:57:02
  end: 00:39:01:13
  text_en: Can you sort of elaborate sort of tangible sort of some initial success case where
  text_ko: 논증 기술을 일반적인 LLM이나
- start: 00:39:01:13
  end: 00:39:08:01
  text_en: you sort of combine the argumentation technology into this typical LLM or any AI system to see
  text_ko: 다른 AI 시스템에 결합하여 개선 효과를 확인할 수 있는 구체적이고 실질적인
- start: 00:39:08:01
  end: 00:39:14:01
  text_en: that improvement? So I mean, combining the,
  text_ko: 초기 성공 사례를 제시해 주실 수 있나요?
- start: 00:39:14:03
  end: 00:39:19:00
  text_en: the LLM with any other AI techniques is always going
  text_ko: LLM을 다른 AI 기술과 결합하는 것은
- start: 00:39:19:00
  end: 00:39:21:16
  text_en: to be challenging. And it requires a lot
  text_ko: 항상 어려운 과제이며, 다소 지난한
- start: 00:39:21:16
  end: 00:39:25:09
  text_en: of, kind of rather dull engineering?
  text_ko: 엔지니어링 작업이 많이 필요하잖아요?
- start: 00:39:25:11
  end: 00:39:28:15
  text_en: It's not all exciting academic design work.
  text_ko: 모두 설레는 학문적 디자인 작업만 있는 건 아니죠.
- start: 00:39:28:17
  end: 00:39:34:10
  text_en: There's sometimes you just need to get down to the nitty gritty.
  text_ko: 때로는 현실적인 문제에 직접 부딪혀야 할 때도 있습니다.
- start: 00:39:34:12
  end: 00:39:37:10
  text_en: And I think one of the, one of the areas in which we've
  text_ko: 그리고 제가 생각하기에 저희가 적어도 어느 정도는
- start: 00:39:37:10
  end: 00:39:43:06
  text_en: done that, at least to some extent, is to try and help the community of
  text_ko: 그렇게 해온 분야 중 하나는 기술 분야에서 추론 구조를 자동으로
- start: 00:39:43:06
  end: 00:39:47:02
  text_en: people who work on the automatic recognition of reasoning structure in text.
  text_ko: 텍스트에서 추론 구조를 자동으로 인식하는 작업을 하는 사람들의 커뮤니티를 돕는 것입니다.
- start: 00:39:47:02
  end: 00:39:51:06
  text_en: And this is the field of argument mining.
  text_ko: 이것이 바로 논증 마이닝 분야입니다.
  caption: Open Argument Mining Framework (oAMF) / 공개 논증 마이닝 프레임워크 (oAMF)
- start: 00:39:51:08
  end: 00:39:53:22
  text_en: There's been a huge amount of work in argument mining because
  text_ko: 논증 마이닝은 매우 어려운 작업이기 때문에
- start: 00:39:53:22
  end: 00:39:57:14
  text_en: it's such a challenging task. And there have been a number of
  text_ko: 엄청난 노력이 필요했습니다.
- start: 00:39:57:14
  end: 00:40:00:06
  text_en: kind of community efforts around kind of
  text_ko: 그리고 공유 작업이나 데이터 세트 등을
- start: 00:40:00:06
  end: 00:40:05:14
  text_en: shared tasks and data sets and so on. One of the things that we've tried to do, is
  text_ko: 중심으로 다양한 커뮤니티 활동이 진행되어 왔습니다. 저희는 이러한 노력을 더욱 발전시키기 위해
- start: 00:40:05:14
  end: 00:40:08:10
  text_en: to push things forward with an open framework.
  text_ko: 개방형 프레임워크를 구축하고자 했습니다.
- start: 00:40:08:10
  end: 00:40:13:03
  text_en: Because so many you need so many different components to
  text_ko: 네. 워낙 많은 요소가 있어서 전체적인 문제를 해결하려면
- start: 00:40:13:03
  end: 00:40:18:06
  text_en: be able to solve the problem at large. So you have to be able to take the text in and
  text_ko: 여러 가지 구성 요소가 필요하거든요. 텍스트를 입력받아야 하고,
- start: 00:40:18:08
  end: 00:40:21:01
  text_en: if there's dialogical interaction, you have to unpick that.
  text_ko: 대화형 상호작용이 있다면 그걸 분석해야 하죠.
- start: 00:40:21:06
  end: 00:40:24:18
  text_en: You have to be able to do appropriate segmentation.
  text_ko: 적절한 세분화를 수행할 수 있어야 합니다.
- start: 00:40:24:18
  end: 00:40:27:13
  text_en: And this is argumentative discourse unit segmentation, elementary discourse unit segmentation.
  text_ko: 이것은 논증적 담화 단위 세분화, 기본 담화 단위 세분화입니다.
- start: 00:40:27:13
  end: 00:40:31:10
  text_en: It's much more challenging. You then have to look for connections.
  text_ko: 훨씬 더 어려운 작업입니다. 그런 다음 연결 고리를 찾아야 합니다.
- start: 00:40:31:10
  end: 00:40:34:14
  text_en: You then have to type those connections. And then perhaps you have to figure out
  text_ko: 그다음에는 그러한 연결들을 입력해야 합니다.
- start: 00:40:34:14
  end: 00:40:37:02
  text_en: what kinds of inferences or conflicts or whatever
  text_ko: 그리고 나서 추론이나 충돌 등
- start: 00:40:37:02
  end: 00:40:40:17
  text_en: there are there to you have to be able to fill in implicit material and on and
  text_ko: 어떤 종류의 요소들이 있는지 파악하고,
- start: 00:40:40:17
  end: 00:40:43:11
  text_en: on and on. And what people have often done is to say,
  text_ko: 암묵적인 내용을 채워 넣어야 하는 등 계속해서 작업을 진행해야 합니다.
- start: 00:40:43:11
  end: 00:40:47:10
  text_en: rather than trying to solve everything, I'm going to focus on this, this chunk,
  text_ko: 사람들은 흔히 모든 것을 해결하려고 하기보다는,
- start: 00:40:47:10
  end: 00:40:50:01
  text_en: which makes a lot of sense, but then you need all the
  text_ko: 이 부분에 집중하는 방식을 택하는데, 이는 타당성이 높지만,
- start: 00:40:50:01
  end: 00:40:54:08
  text_en: other things to already be done in order to apply the work of that one chunk.
  text_ko: 그러려면 다른 모든 작업이 이미 완료되어 있어야만 해당 부분의 작업을 적용할 수 있습니다.
- start: 00:40:54:08
  end: 00:41:00:20
  text_en: And so what we've done is to produce a framework called the Open Argument Mining Framework (oAMF),
  text_ko: 그래서 저희는 Open Argument Mining Framework(oAMF)라는 프레임워크를 개발했습니다.
- start: 00:41:00:20
  end: 00:41:05:16
  text_en: which aims to provide an environment
  text_ko: 이 프레임워크는 다양한 구성 요소를 효과적으로
- start: 00:41:05:16
  end: 00:41:11:14
  text_en: in which you can effectively pipeline the different components to be able to
  text_ko: 파이프라인 방식으로 연결하여, 주어진 순간에 원하는 구성 요소를
- start: 00:41:11:15
  end: 00:41:14:10
  text_en: take advantage of whichever ones you want at a given moment.
  text_ko: 활용할 수 있는 환경을 제공하는 것을 목표로 합니다.
- start: 00:41:14:10
  end: 00:41:17:04
  text_en: So if you're not interested in segmentation, you can just pull
  text_ko: 세분화에 관심이 없다면 세분화 모듈 중
- start: 00:41:17:04
  end: 00:41:20:15
  text_en: one of the segmentation modules. Apply your thing to do.
  text_ko: 하나를 선택하여 적용하면 됩니다.
- start: 00:41:20:15
  end: 00:41:25:16
  text_en: I don't know, connected connectedness. And then use an application that produces
  text_ko: 음, 연결된 연결성이라고 할까요? 그리고 멋진 사진을 만들어주는
- start: 00:41:25:19
  end: 00:41:29:14
  text_en: cool pictures or whatever. So there's
  text_ko: 애플리케이션을 사용하는 거죠. 네. 프레임워크에는 거의
- start: 00:41:29:16
  end: 00:41:32:15
  text_en: maybe almost 100 different modules in the framework,
  text_ko: 100개에 달하는 모듈이 있는데, 일부는 저희 연구 그룹에서
- start: 00:41:32:20
  end: 00:41:36:20
  text_en: some of them developed by my research group, some from elsewhere in the community.
  text_ko: 개발했고, 일부는 커뮤니티의 다른 구성원들이 개발했습니다.
- start: 00:41:36:22
  end: 00:41:42:16
  text_en: And you can actually with very little, programing expertise, essentially drag
  text_ko: 실제로 프로그래밍 전문 지식이 거의 없어도 드래그 앤 드롭 방식으로
- start: 00:41:42:16
  end: 00:41:45:20
  text_en: and drop and build pipelines and press the go button and chuck your data in.
  text_ko: 파이프라인을 구축하고 실행 버튼을 눌러 데이터를 입력할 수 있습니다.
- start: 00:41:45:22
  end: 00:41:54:00
  text_en: So this is a kind of environment in which you have some modules that are either completely or
  text_ko: 그러니까, 이 환경은 완전히 또는 매우 크게
- start: 00:41:54:00
  end: 00:41:57:06
  text_en: very heavily dependent on the new neural LLM kind of type of processing.
  text_ko: 새로운 신경망 LLM 유형의 처리에 의존하는 모듈들이 있는 반면,
- start: 00:41:57:06
  end: 00:42:01:18
  text_en: You've got other elements that are absolutely completely Symbolic in either doing automated
  text_ko: 자동 추론이나 시각화 또는 다른 종류의 처리를 수행하는
- start: 00:42:01:18
  end: 00:42:08:18
  text_en: reasoning or visualisation or other kinds of processing.
