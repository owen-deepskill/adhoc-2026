  end: 00:00:58:11
  text_en: into this intersection. So his vision is to kind of provoke people's thoughts
  text_ko: 만나 이 분야, 즉 여러 학문의 교차점을 연구하는 그의 비전을 살펴보았습니다. 그는 사람들의 생각을 자극하고 적절한
