- start: 00:00:00:06
  end: 00:00:07:00
  text_en: Today we are seeing dizzying technological shifts, especially, after the advent of the LLM.
  text_ko: 오늘날 우리는 현기증 나는 기술의 변화를 보고 있습니다. 특히 LLM의 등장 이후 더욱 그랬죠.
- start: 00:00:07:02
  end: 00:00:09:19
  text_en: So many of us are struggling to find out what's the right way
  text_ko: 많은 사람들이 기술 변화에 적응하는 올바른
- start: 00:00:09:19
  end: 00:00:13:03
  text_en: to adapt ourselves to the technological changes.
  text_ko: 방법을 찾는 데 어려움을 겪고 있습니다.
- start: 00:00:13:03
  end: 00:00:15:18
  text_en: But at the same time, what’s more important is
  text_ko: 하지만 동시에 더 중요한 것은 무엇이 변하고 있는가 하는
  edit: 삭제
- start: 00:00:15:18
  end: 00:00:19:01
  text_en: What is changing. But maybe it's more important to
  text_ko: 어쩌면 변하지 않는 것이 무엇인지 묻는 것이 더 중요할지도 모릅니다.
  edit: But maybe 부터 시작
- start: 00:00:19:01
  end: 00:00:26:02
  text_en: ask what is not changing. As a human, We have used our rules of the logic
  text_ko: 인간은 오랫동안 논리적 규칙을
- start: 00:00:26:02
  end: 00:00:29:14
  text_en: to persuade and to make a decision
  text_ko: 사용하여 다른 사람들을 설득하고 결정을 내려왔습니다.
- start: 00:00:29:14
  end: 00:00:32:00
  text_en: with a group of people. So we have been following
  text_ko: 우리는 지난 2000년 동안 이러한 논리적 규칙을 따라왔죠.
- start: 00:00:32:00
  end: 00:00:36:04
  text_en: these rules, rules of the logic, for last,
  text_ko: 그리고 저는 바로 이 두 가지
- start: 00:00:36:04
  end: 00:00:40:03
  text_en: last 2000 years. And I found that there is exactly at the intersection
  text_ko: 접근 방식이 교차하는 지점의 연구를 찾게 되었습니다.
- start: 00:00:40:03
  end: 00:00:42:20
  text_en: of these two philosophical and the technological approach.
  text_ko: 철학적이면서도 기술적인 접근의 접점인 것이죠.
- start: 00:00:43:00
  end: 00:00:44:18
  text_en: We found that there is an academic field
  text_ko: 이 학문 분야는
- start: 00:00:44:18
  end: 00:00:49:09
  text_en: called argumentation technology. And today we have the visionary,
  text_ko: 논증 기술(Argumentation Technology)이라 하는데요. 그리고 오늘 우리는 이 분야의 선구적인 학자를 만나,
- start: 00:00:49:11
  end: 00:00:53:18
  text_en: scholar in this field of research who is kind of researching into this,
  text_ko: 이 분야에서 여러 학문의 교차점을 연구하는 그의 비전을 살펴보았습니다.
- start: 00:00:53:18
  end: 00:00:58:11
  text_en: into this intersection. So his vision is to kind of provoke people's thoughts
  text_ko: 그는 사람들의 생각을 자극하고 적절한 조합을 통해
- start: 00:00:58:11
  end: 00:01:03:08
  text_en: and to kind of how to enhance their critical thinking skills with the right combination.
  text_ko: 비판적 사고 능력을 향상시키는 방법을 모색하고 있습니다.
- start: 00:01:03:08
  end: 00:01:08:02
  text_en: So, we have Professor Chris Reed from the University of Dundee
  text_ko: 오늘은 던디 대학교의 크리스 리드 교수님께서 자신의 연구와
- start: 00:01:08:02
  end: 00:01:12:09
  text_en: Who is going to introduce his research and how we can accommodate this approach
  text_ko: 이 접근 방식을 실제 응용 분야에 어떻게 적용할 수 있는지에
- start: 00:01:12:09
  end: 00:01:15:09
  text_en: into the real world application.
  text_ko: 대해 말씀을 들어볼게요.
- start: 00:01:15:11
  end: 00:01:20:05
  text_en: Thank you very much for that warm introduction, and thank you for welcoming me here to
  text_ko: 따뜻한 소개 말씀 정말 감사합니다.
  caption: Chris Reed (ArgTech, University of Dundee) / 크리스 리드 (논증 기술 연구소장, 던디대학교)
- start: 00:01:20:07
  end: 00:01:23:04
  text_en: to join you.
  text_ko: 그리고 이곳에 함께할 수 있도록 초대해 주셔서 감사합니다.
- start: 00:01:23:06
  end: 00:01:25:11
  text_en: Perhaps we can start with your introduction.
  text_ko: 먼저 자기소개를 부탁드려도 될까요?
- start: 00:01:25:12
  end: 00:01:27:12
  text_en: Just a brief introduction. What you have been working on
  text_ko: 간단한 설명이 도움이 될 것 같아요. 어떤 연구를 해오셨고,
- start: 00:01:27:12
  end: 00:01:32:14
  text_en: what you have in your research interest and why it matters these days.
  text_ko: 그 분야가 왜 오늘날 중요할까요?
- start: 00:01:32:16
  end: 00:01:36:24
  text_en: So, for the past three decades, actually,
  text_ko: 사실 저는 지난 30년 동안 AI 모델링,
- start: 00:01:36:24
  end: 00:01:43:05
  text_en: I've been working on AI modeling with a specific focus on
  text_ko: 특히 논증과 인간의 추론에 초점을 맞춰 연구해 왔습니다.
- start: 00:01:43:05
  end: 00:01:48:08
  text_en: argumentation and human reasoning. So trying to understand the ways
  text_ko: 사람들이 어떻게
- start: 00:01:48:08
  end: 00:01:54:23
  text_en: in which people, produce well-reasoned, well-thought through
  text_ko: 논리적이고 심사숙고된 언어적 표현을 만들어내는지 이해하려고
- start: 00:01:54:23
  end: 00:02:00:03
  text_en: pieces of linguistic material. And so the focus is
  text_ko: 노력해 온 것이죠. 따라서 제 연구의 핵심은
- start: 00:02:00:03
  end: 00:02:15:12
  text_en: very much on the performance of argumentation and the reaching of solidly justified decisions.
  text_ko: 논증의 수행과 타당성을 갖춘 결론에 도달하는 과정에 있습니다.
- start: 00:02:15:14
  end: 00:02:17:09
  text_en: with they express their disagreement and
  text_ko: 사람들이 논쟁하거나 의견이 다를 때, 그들은 자신의 반대 의견을 표현하고
- start: 00:02:17:09
  end: 00:02:19:22
  text_en: they come into conflict. And when they try to resolve
  text_ko: 갈등을 겪게 됩니다. 그리고 그 갈등을 합의된 해결책으로
- start: 00:02:19:22
  end: 00:02:26:10
  text_en: those conflicts into, into agreed, ways forward. There are so many things in play.
  text_ko: 해결하려고 할 때, 수많은 요소들이 작용합니다.
- start: 00:02:26:14
  end: 00:02:31:13
  text_en: So you have to integrate the the kind of face work
  text_ko: 이 과정에서 체면치레와 예의, 그리고
- start: 00:02:31:13
  end: 00:02:34:09
  text_en: and the politeness and all the social interaction material,
  text_ko: 모든 사회적 상호작용 요소를 통합해야 합니다.
- start: 00:02:34:09
  end: 00:02:35:17
  text_en: because conflict is hard
  text_ko: 왜냐하면 사람들은
- start: 00:02:35:17
  end: 00:02:37:18
  text_en: for people to manage.
  text_ko: 갈등을 관리하기 어려워하기 때문입니다.
- start: 00:02:37:18
  end: 00:02:44:07
  text_en: With, the need for evidence for scrutiny. And so a kind of objectivity,
  text_ko: 바로 이 때, 증거를 통해 검증해야 하는 것이죠. 따라서 객관성, 신뢰성 등의 요소가
- start: 00:02:44:13
  end: 00:02:49:09
  text_en: reliability, and all of that then interacts with the rest of the world and the evidence
  text_ko: 세상과 상호작용하고, 기존의 증거들, 검증 여부,
- start: 00:02:49:09
  end: 00:02:53:16
  text_en: that's out there and the ability to test or not testing to refine
  text_ko: 개선 방안 등과 맞물리게 됩니다.
- start: 00:02:53:16
  end: 00:02:56:08
  text_en: and so on. And so you have this,
  text_ko: 이렇게 모든 종류의 정교한
- start: 00:02:56:08
  end: 00:03:00:20
  text_en: this kind of nexus of all sorts of sophisticated human behavior.
  text_ko: 인간 행동이 복잡하게 얽혀 있는 구조가 형성되는 것입니다.
- start: 00:03:00:20
  end: 00:03:06:12
  text_en: That, that kind of comes together. So there's a lot to handle if you want to be able to,
  text_ko: 그런 것들이 모여서 하나의 큰 그림을 그리는 거죠.
- start: 00:03:06:12
  end: 00:03:13:16
  text_en: to model and then subsequently perhaps, critique or engage with or support that human reasoning.
  text_ko: 인간의 추론을 모델링하고, 나아가 비판하거나, 참여하거나, 지지하려면 다뤄야 할 것들이 정말 많습니다.
- start: 00:03:13:16
  end: 00:03:15:01
  text_en: So that's been my focus for a long time.
  text_ko: 그게 제가 오랫동안 집중해 온 부분입니다.
- start: 00:03:15:01
  end: 00:03:18:15
  text_en: And there has been a lot to do.
  text_ko: 그러기 위해 할 게 많았어요.
- start: 00:03:18:17
  end: 00:03:23:20
  text_en: So, so so first of all, I mean, one of the initial problems
  text_ko: 우선, 우리가 직면한 초기 문제 중
  caption: Genesis of ArgTech / 논증 기술의 초창기 연구
- start: 00:03:23:20
  end: 00:03:26:21
  text_en: that we have is that although as you alluded to in your introduction,
  text_ko: 하나는, 서두에서 언급하셨듯이
- start: 00:03:26:21
  end: 00:03:28:14
  text_en: argumentation theory as a discipline is
  text_ko: 논증 이론이라는 학문 자체가
- start: 00:03:28:14
  end: 00:03:34:18
  text_en: effectively more than 2000 year old, 2000 years old, stretching right the way back,
  text_ko: 아리스토텔레스 시대 이전까지 거슬러 올라가 2000년이
- start: 00:03:34:18
  end: 00:03:40:20
  text_en: to Aristotle and beyond. But there's not a lot of what,
  text_ko: 넘는 역사를 가지고 있음에도 불구하고, 현대 AI 연구자들이 데이터라고
- start: 00:03:40:20
  end: 00:03:44:22
  text_en: in the modern world, AI researchers would call data.
  text_ko: 부르는 자료가 많지 않다는 점입니다.
- start: 00:03:44:22
  end: 00:03:47:14
  text_en: There's not a lot of rule.
  text_ko: 규칙이 많지 않아요.
- start: 00:03:47:14
  end: 00:03:51:14
  text_en: And this was a problem from very early on because there's a lot of,
  text_ko: 그리고 이건 아주 초창기부터 문제였는데,
- start: 00:03:51:14
  end: 00:03:57:03
  text_en: kind of 20th century philosophy, focusing on the structure of argumentation.
  text_ko: 20세기 철학에서 논증의 구조에 초점을 맞춘 부분이 많았기 때문입니다.
- start: 00:03:57:03
  end: 00:03:59:03
  text_en: But most of that is conducted
  text_ko: 하지만 그러한 연구의 대부분은 실제로 무엇이 진실인지,
- start: 00:03:59:03
  end: 00:04:03:12
  text_en: in the analytical tradition of kind of reflecting on what must be true,
  text_ko: 사람들이 실제로 무엇을 주장하는지 직접 확인하기보다는,
- start: 00:04:03:12
  end: 00:04:09:15
  text_en: rather than going out and seeing what actually is true, what people actually argue.
  text_ko: 무엇이 진실이어야 하는지를 고찰하는 분석적 전통에 따라 진행됩니다.
- start: 00:04:09:17
  end: 00:04:14:01
  text_en: And that empirical term, is really only very, very recent.
  text_ko: 그래서 이 경험적 용어는 사실 아주 최근에 생긴 개념입니다.
- start: 00:04:14:01
  end: 00:04:16:04
  text_en: And so one of the things that
  text_ko: 우리가 해야 했던 일 중 하나는 사람들이 어떻게
- start: 00:04:16:04
  end: 00:04:19:06
  text_en: we had to do, beyond was to go look at
  text_ko: 논쟁하는지 살펴보는 것이었습니다.
- start: 00:04:19:06
  end: 00:04:24:21
  text_en: how people argue. And that sounds kind of trivial, but one of the, one of the challenges is
  text_ko: 사소하게 들릴 수도 있지만, 특히 컴퓨터 환경에서 이를 수행하려면
- start: 00:04:24:21
  end: 00:04:27:24
  text_en: if you want to do that, particularly in a computational setting,
  text_ko: 도구와 인프라가 필요하다는 점이
- start: 00:04:28:01
  end: 00:04:30:10
  text_en: then you need tools. You need infrastructure.
  text_ko: 어려운 과제 중 하나였습니다.
- start: 00:04:30:11
  end: 00:04:35:02
  text_en: You need to be able to bring that data together, to analyze it, to annotate it.
  text_ko: 데이터를 수집하고 분석하고 주석을 달 수 있어야 합니다.
- start: 00:04:35:04
  end: 00:04:40:13
  text_en: And none of that existed. So so we kind of have to start from zero,
  text_ko: 그 당시에는 그런 것들이 전혀 없었죠.
- start: 00:04:40:13
  end: 00:04:44:19
  text_en: start to build up the tool sets. The analytical techniques,
  text_ko: 그래서 우리는 말 그대로 맨땅에서 시작해서 도구들을 하나씩 구축해 나가야 했습니다.
- start: 00:04:44:19
  end: 00:04:48:12
  text_en: the annotation guidelines drive all of that to the point
  text_ko: 분석 기법과 주석 지침들이 이 모든 과정을 이끌어,
- start: 00:04:48:12
  end: 00:04:50:21
  text_en: at which we’re able to start collecting the data.
  text_ko: 마침내 데이터를 수집할 수 있는 단계에 이르게 했습니다.
- start: 00:04:50:21
  end: 00:04:56:06
  text_en: That took about a decade. And then and then indeed go out and
  text_ko: 그렇게 하는 데 약 10년이 걸렸습니다. 그리고 나서야 비로소
- start: 00:04:56:06
  end: 00:04:59:10
  text_en: look at the way in which people argue in different domains,
  text_ko: 사람들이 다양한 영역에서 어떻게 논쟁하는지 살펴볼 수 있었습니다.
- start: 00:04:59:10
  end: 00:05:03:07
  text_en: because arguing is effectively ubiquitous across the human experience.
  text_ko: 왜냐하면 논쟁은 사실상 인간 경험 전반에 걸쳐 보편적이기 때문입니다.
- start: 00:05:03:07
  end: 00:05:06:03
  text_en: So, whether you're a lawyer
  text_ko: 법정의 변호사든,
- start: 00:05:06:03
  end: 00:05:12:14
  text_en: in the courtroom or, husband and wife at home arguing about who's going to do the dishes.
  text_ko: 집에서 누가 설거지를 할 건지 다투는 부부든 상관없이요.
- start: 00:05:12:19
  end: 00:05:15:15
  text_en: You know, the processes that we go through are
  text_ko: 아시다시피, 우리가 거치는 과정들은 매우 유사합니다.
- start: 00:05:15:15
  end: 00:05:19:03
  text_en: very similar. There are commonalities
  text_ko: 이러한 다양한 논증 영역 전반에 걸쳐
- start: 00:05:19:05
  end: 00:05:22:04
  text_en: across all of these different domains of argumentation.
  text_ko: 공통점이 있습니다.
- start: 00:05:22:06
  end: 00:05:25:05
  text_en: But then at the same time, there are also subtleties,
  text_ko: 하지만 동시에 기업 이사회에서 논쟁하는 방식과
- start: 00:05:25:07
  end: 00:05:28:05
  text_en: of huge differences between how people argue
  text_ko: 실제 업무를 수행하는 방식에는
- start: 00:05:28:05
  end: 00:05:30:24
  text_en: in the corporate boardroom as opposed to
  text_ko: 미묘한 차이, 엄청난 차이가 존재하기도 합니다.
- start: 00:05:31:03
  end: 00:05:35:06
  text_en: trying to do. So so we had to go and get a
  text_ko: 네, 맞습니다. 그래서 저희는 이러한
- start: 00:05:35:06
  end: 00:05:38:05
  text_en: lot of data from all these different domains.
  text_ko: 다양한 영역에서 많은 데이터를 수집해야 했습니다.
- start: 00:05:38:07
  end: 00:05:43:03
  text_en: And apply consistent annotation techniques to be able to
  text_ko: 또한 일관된 주석 기법을 적용하여
- start: 00:05:43:03
  end: 00:05:51:00
  text_en: build up large corpora and then start to build the systems, based on, those data sets.
  text_ko: 대규모 대화 데이터를 구축하고, 그 데이터 세트를 기반으로 시스템을 구축하기 시작해야 합니다.
- start: 00:05:51:00
  end: 00:05:53:20
  text_en: And so effectively, what happened over the course of,
  text_ko: 그래서 말씀드린 대로 수십 년에 걸쳐
- start: 00:05:53:20
  end: 00:05:56:21
  text_en: as I say, several decades, was this emergence of
  text_ko: 다양한 도구, 데이터 세트, 
- start: 00:05:56:21
  end: 00:06:01:19
  text_en: an ecosystem of different tools and data sets and techniques of algorithms.
  text_ko: 알고리즘 기법으로 이루어진 생태계가 등장하게 된 것입니다.
- start: 00:06:01:19
  end: 00:06:06:18
  text_en: And then about ten years ago, what happened was that we realized that
  text_ko: 그러다가 약 10년 전, 새로운 AI의 등장과
- start: 00:06:06:18
  end: 00:06:10:23
  text_en: with the advent of new AI and subsequently, not long subsequently,
