  end: 00:02:31:13
  text_en: So you have to integrate the the kind of face work
  text_ko: 그러므로 체면치레와 예의, 그리고 모든 사회적 상호작용 요소를 통합해야 합니다. 왜냐하면 사람들은
- start: 00:02:31:13
  end: 00:02:34:09
  text_en: and the politeness and all the social interaction material,
  text_ko: 상호작용 요소를 통합해야 합니다. 왜냐하면 사람들은
