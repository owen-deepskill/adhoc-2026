  text_en: emotions and something.
  text_ko: 동물 같은 것에 대해 이야기하는 거죠.
- start: 00:30:41:05
  end: 00:30:47:19
  text_en: So it's isomorphic problem, but just the lexical surface.
  text_ko: 그러니까 동형 문제인 거죠. 다만 어휘적 표면만 다를 뿐입니다.
- start: 00:30:47:19
  end: 00:30:53:20
  text_en: And in the experimentation that Rao had done through 23 and 24,
  text_ko: 그리고 라오가 23년과 24년에 걸쳐 진행한 실험에서,
- start: 00:30:53:22
  end: 00:30:56:13
  text_en: performance dropped from about 300 of these 600.
  text_ko: 성능이 약 300개 정답에서
- start: 00:30:56:13
  end: 00:31:07:18
  text_en: 600 to. Wait for it. Zero.
  text_ko: 얼마로 떨어졌게요? 0개가 되었습니다.
- start: 00:31:07:18
  end: 00:31:10:13
  text_en: So you've got no real reason whatsoever.
  text_ko: 그러니까 진짜 추론이 전혀 없다는 거죠.
- start: 00:31:10:14
  end: 00:31:13:23
  text_en: You've got activity that looks like
  text_ko: 그럴듯한 추론처럼 보이는 활동이 있을 뿐이지만,
- start: 00:31:13:23
  end: 00:31:16:21
  text_en: credible reasoning. But if it were actually
  text_ko: 만약 실제로 추론이라면,
- start: 00:31:16:21
  end: 00:31:19:10
  text_en: reasoning then it doesn't make any difference whether you're talking
  text_ko: 블록에 대해 이야기하든 동물에 대해 이야기하든
- start: 00:31:19:10
  end: 00:31:23:23
  text_en: about blocks or animals. The reasoning structure is identical, of course.
  text_ko: 아무런 차이가 없어야 합니다. 추론 구조는 당연히 동일하기 때문입니다.
- start: 00:31:23:23
  end: 00:31:26:09
  text_en: And it wasn't just a drop off.
  text_ko: 그리고 단순히 감소한 정도가 아니었습니다.
- start: 00:31:26:09
  end: 00:31:28:22
  text_en: It was actually to nothing.
  text_ko: 완전히 0점으로 떨어진 거죠.
- start: 00:31:29:02
  end: 00:31:31:20
  text_en: And I found that absolutely fascinating.
  text_ko: 정말 인상적이었어요.
- start: 00:31:31:20
  end: 00:31:35:09
  text_en: Now Raoul proposes a number of ways of tackling this.
  text_ko: 이제 라오는 이 문제를 해결할 수 있는 여러 방법을 제안합니다.
- start: 00:31:35:09
  end: 00:31:37:06
  text_en: There's obviously more to the story.
  text_ko: 분명히 더 많은 내용이 있습니다.
- start: 00:31:37:06
  end: 00:31:41:15
  text_en: But the headline there I think is really
  text_ko: 하지만 제가 보기에 그 핵심은 정말
- start: 00:31:41:17
  end: 00:31:44:20
  text_en: fascinating as a way
  text_ko: 주목할 만합니다. 이것이 얼마나 심각한
- start: 00:31:44:20
  end: 00:31:49:04
  text_en: of understanding that this is a very serious problem.
  text_ko: 문제인지 이해하는 방법으로요.
- start: 00:31:49:04
  end: 00:31:53:01
  text_en: It's not the problem of LLMs not being able to reason.
  text_ko: LLM이 추론을 못하는 게 문제가 아닙니다.
- start: 00:31:53:02
  end: 00:31:56:03
  text_en: It's the problem of LLMs not being able to reason
  text_ko: 문제는 LLM이 추론을 못하면서도 마치 할 수 있는 것처럼 보인다는
- start: 00:31:56:03
  end: 00:31:59:23
  text_en: but looking like they can. And then.
  text_ko: 점입니다. 그리고 그게 바로
- start: 00:32:02:08
  end: 00:32:05:00
  text_en: So that's the real risk that is presented by these.
  text_ko: 정말 위험한 것입니다.
- start: 00:32:05:02
  end: 00:32:07:17
  text_en: by the current version of the technologies.
  text_ko: 현재 기술 버전에 의해 제시되는 것입니다.
- start: 00:32:10:05
  end: 00:32:15:00
  text_en: So one of the things that we did on the, inspired by the work of Kambapati was to
  text_ko: 그래서 우리가 캄바파티의 연구에서 영감을 받아 한 일 중 하나는
- start: 00:32:15:01
  end: 00:32:21:24
  text_en: to do a similar bit of analysis on argumentation.
  text_ko: 논증에 대한 유사한 분석을 하는 것이었습니다.
- start: 00:32:22:03
  end: 00:32:30:14
  text_en: So a different kind of reasoning, not necessarily practical reasoning, action oriented reasoning, but epistemic.
  text_ko: 그러니까 다른 종류의 추론이죠. 반드시 실천적 추론이나 행동 지향적 추론일 필요는 없고, 인식론적 추론입니다.
- start: 00:32:30:16
  end: 00:32:33:02
  text_en: We've used a number of different examples.
  text_ko: 우리는 여러 가지 다른 예시를 사용했습니다.
- start: 00:32:33:02
  end: 00:32:37:12
  text_en: So we did one set of experiments around, these kind of logic puzzles,
  text_ko: 그래서 저희는 일종의 논리 퍼즐 같은 실험을 하나 해봤어요.
- start: 00:32:37:12
  end: 00:32:41:02
  text_en: where you, you've got, I don't know, you've got a white house, a blue house,
  text_ko: 예를 들어, 하얀 집, 파란 집, 빨간 집, 초록 집
- start: 00:32:41:02
  end: 00:32:42:22
  text_en: a red house, green house. You've got four.
  text_ko: 이렇게 네 채가 있는 거죠.
- start: 00:32:42:22
  end: 00:32:48:07
  text_en: you've got five scientists, you've got Einstein owns a dog.
  text_ko: 과학자가 다섯 명 있고, 아인슈타인이 개를 키운다는 거죠.
- start: 00:32:48:07
  end: 00:32:52:20
  text_en: The person with the fish lives next door to the zebra, that kind of thing.
  text_ko: 물고기를 키우는 사람은 얼룩말 옆집에 산다는 식이죠.
- start: 00:32:52:20
  end: 00:32:57:18
  text_en: And then you get a question of, like what's the name of Einstein's dog? Or whatever.
  text_ko: 그리고 "아인슈타인의 개 이름은 뭐예요?" 같은 질문이 나오죠.
- start: 00:32:57:20
  end: 00:33:01:20
  text_en: So, the the there is always just enough information for
  text_ko: 그러니까, 문제를 해결하는 데 필요한 정보는 항상 충분히
- start: 00:33:01:20
  end: 00:33:04:17
  text_en: you to be able to solve this. What are interesting about this is that
  text_ko: 제공됩니다. 주목할 점은 이러한 문제의 난이도를
- start: 00:33:04:17
  end: 00:33:09:00
  text_en: you can very precisely calibrate, the challenge of these problems.
  text_ko: 매우 정확하게 조절할 수 있다는 것입니다.
- start: 00:33:09:00
  end: 00:33:12:18
  text_en: Because you can change the number of variables, in each of the
  text_ko: 각기 다른 범주에서 변수의 개수를 변경할 수 있기
- start: 00:33:12:18
  end: 00:33:18:07
  text_en: different categories. And so we ran a bunch of experiments.
  text_ko: 때문입니다. 그래서 저희는 여러 가지 실험을 진행했습니다.
- start: 00:33:18:07
  end: 00:33:24:09
  text_en: And to cut a very long story short, found again that LLMs appear to do
  text_ko: 간단히 말해서, LLM이 특히 질문이
- start: 00:33:24:09
  end: 00:33:29:06
  text_en: very well, particularly when the question
  text_ko: 훈련 데이터에 포함되어 있을 때 매우 잘하는 것으로 나타났습니다.
- start: 00:33:29:06
  end: 00:33:32:18
  text_en: is in their training data. But when you give them new problems,
  text_ko: 하지만 새로운 문제, 특히 더 어려운 문제를
- start: 00:33:32:18
  end: 00:33:37:00
  text_en: particularly more challenging new problems, the failure is absolute.
  text_ko: 제공하면 완전히 실패합니다.
- start: 00:33:37:00
  end: 00:33:42:22
  text_en: We've also, had a look recently at taking
  text_ko: 맞죠? 저희는 최근에 실제 논증을 살펴보기도 했습니다.
- start: 00:33:42:22
  end: 00:33:46:01
  text_en: real argumentation. And we were inspired
  text_ko: 그리고 기본적으로 이렇게 생각했죠. "좋아요,
- start: 00:33:46:01
  end: 00:33:48:06
  text_en: to basically say, okay, so we've got all of this
  text_ko: 기본적으로 이렇게 말하는 거죠. 우리가 가진 모든
- start: 00:33:48:06
  end: 00:33:52:24
  text_en: argumentation structure and the data sets that I mentioned. So let's
  text_ko: 논증 구조와 제가 언급한 데이터셋이 있으니, 이 중 하나를 살펴보고
- start: 00:33:52:24
  end: 00:33:57:11
  text_en: have a look at one of these and pick an argument with, say, I don't know,
  text_ko: 예를 들어, 하나의 전제가 중간 결론을 뒷받침하고,
- start: 00:33:57:13
  end: 00:34:00:22
  text_en: a single premise that supports an intermediate conclusion, that supports
  text_ko: 그 중간 결론이 최종 결론을 뒷받침하는 논증을 하나 선택해 보자.
- start: 00:34:00:22
  end: 00:34:05:15
  text_en: a final conclusion, and then let's mask out that intermediate.
  text_ko: 그리고 그 중간 결론을 가려보자.
- start: 00:34:05:15
  end: 00:34:09:24
  text_en: So we say to the LLM, here's a premise.
  text_ko: 그러면 LLM에게 이렇게 말하는 거죠. 여기 전제가 있습니다.
- start: 00:34:09:24
  end: 00:34:12:04
  text_en: Here's a final conclusion, what's going to.
  text_ko: 여기 최종 결론이 있습니다. 중간에 무엇이 들어갈까요?
- start: 00:34:12:04
  end: 00:34:16:12
  text_en: And then, and then we pick a set of things, including the actual intermediate composition,
  text_ko: 그리고 실제 중간 구성 요소를 포함하여 몇 가지를 선택하고,
- start: 00:34:16:17
  end: 00:34:19:03
  text_en: and then three other things that are rather similar and we ask the LLM,
  text_ko: 비슷한 다른 세 가지를 더 선택해서 LLM에게 물어보는 거죠.
- start: 00:34:19:03
  end: 00:34:23:08
  text_en: so what should go in the middle?
  text_ko: 중간에 무엇이 들어가야 할까요?
- start: 00:34:23:10
  end: 00:34:26:19
  text_en: And roughly they perform no better than chance.
  text_ko: 대략적으로 말하자면, 그 결과는 동전 던지기보다 나을 게 없습니다.
- start: 00:34:26:21
  end: 00:34:29:11
  text_en: No better than chance, okay, so it's just random.
  text_ko: 우연보다 나을 게 없어요. 그러니까 그냥 무작위인 거죠.
- start: 00:34:29:16
  end: 00:34:33:10
  text_en: And so it seems with all of these different
  text_ko: 그래서 고전적인 계획 수립이든,
- start: 00:34:33:12
  end: 00:34:40:16
  text_en: kinds of reasoning, whether it's classical planning or logical puzzles or human style argumentation, in each case
  text_ko: 논리 퍼즐이든, 인간 스타일의 논증이든, 이러한 다양한 추론 방식 모두에서
- start: 00:34:40:16
  end: 00:34:46:03
  text_en: there seems to be a fundamental limitation in what LLMs can do.
  text_ko: LLM이 할 수 있는 것에 근본적인 한계가 있는 것 같습니다.
- start: 00:34:46:03
  end: 00:34:53:03
  text_en: And I'm not able to sit here and say, you know, LLMs will never be able to do that.
  text_ko: 그리고 저는 여기 앉아서 LLM이 절대로 그것을 할 수 없을 거라고 말할 수는 없어요.
- start: 00:34:53:07
  end: 00:34:58:20
  text_en: It's just that at the moment there is no evidence that the current techniques are scaling in the direction of being.
  text_ko: 다만 현재로서는 현행 기술들이 그 방향으로 확장되고 있다는 증거가 없다는 겁니다.
- start: 00:35:01:20
  end: 00:35:05:01
  text_en: So maybe we can come up with something extra.
  text_ko: 네. 그럼 뭔가 특별한 걸 생각해낼 수 있을지도 모르겠네요.
- start: 00:35:05:02
  end: 00:35:09:06
  text_en: Maybe the current techniques will just scale, but at the moment there's no evidence.
  text_ko: 현재 기술들이 그냥 확장될 수도 있지만, 현재로서는 증거가 없습니다.
- start: 00:35:09:06
  end: 00:35:12:16
  text_en: I get that, yeah. So that limitation is quite
  text_ko: 네, 이해합니다. 그래서 그 한계점은 상당히
  caption: AI-human collaboration / AI와 인간의 협력 가능성
- start: 00:35:12:16
  end: 00:35:18:05
  text_en: a meaningful finding because that gives kind of room for how to the AI and the
  text_ko: 의미 있는 발견입니다. 왜냐하면 AI과 인간이 어떻게
- start: 00:35:18:05
  end: 00:35:20:20
  text_en: human need to collaborate.
  text_ko: 협력해야 할지에 대한 여지를 주기 때문입니다.
- start: 00:35:20:20
  end: 00:35:28:15
  text_en: So I think that this limitation in current LLM technology represents
  text_ko: 그래서 저는 현재 LLM 기술의 이러한 한계가
- start: 00:35:28:15
  end: 00:35:32:02
  text_en: an opportunity both for the application of
  text_ko: LLM의 적용뿐 아니라
- start: 00:35:32:02
  end: 00:35:40:23
  text_en: LLMs and also for the connection of LLMs to other types of AI, which, one
  text_ko: LLM을 다른 유형의 AI와 연결하는 데에도 기회를 제공한다고 생각합니다. 아시다시피, 이러한 AI는 완전히
- start: 00:35:40:23
  end: 00:35:43:08
  text_en: would be forgiven for thinking had completely vanished.
  text_ko: 사라졌다고 생각하기 쉽지만 말입니다.
- start: 00:35:43:08
  end: 00:35:47:01
  text_en: But there is a lot of, valuable
  text_ko: 하지만 LLM과 함께 활용하여 가치를
- start: 00:35:47:01
  end: 00:35:56:09
  text_en: other AI techniques and technology out there, which can be used in concert with, LLMs to be able to
  text_ko: 창출할 수 있는 유용한 AI 기술들이 많이 있습니다. 따라서 저는 앞으로
- start: 00:35:56:09
  end: 00:35:59:20
  text_en: to deliver value. And so I think that there is a
  text_ko: 기회가 있을 것이라고 생각하며,
- start: 00:35:59:20
  end: 00:36:05:13
  text_en: an opportunity on the horizon and indeed this has been discussed in a number of places,
  text_ko: 여러 곳에서 이 주제가 논의되었습니다.
- start: 00:36:05:13
  end: 00:36:13:03
  text_en: including by Rao Kambapati, that by combining some aspects of
  text_ko: 라오 캄바파티를 포함하여 여러 곳에서 논의되었는데, 전통적인 AI와
- start: 00:36:13:03
  end: 00:36:18:02
  text_en: good old fashioned AI and modern AI that's not
  text_ko: 통계적 언어 분석이 아닌 현대 AI의 일부를 결합함으로써
- start: 00:36:18:02
  end: 00:36:21:18
  text_en: statistical language analysis, there's maybe
  text_ko: 새로운 영역이 열릴 수 있을 것입니다.
- start: 00:36:21:18
  end: 00:36:25:16
  text_en: new frontiers to be opened up. And I think that reasoning is a
  text_ko: 그리고 제 생각에는 추론이 바로 완벽한 예라고 생각합니다.
- start: 00:36:25:16
  end: 00:36:29:13
  text_en: perfect example. Because so much work in
  text_ko: 왜냐하면 대부분이 추론 모델 개발이나,
- start: 00:36:29:13
  end: 00:36:33:15
  text_en: AI, prior to 2017, had been focused on
  text_ko: 어떻게 움직이는지, 어떻게 효율적으로
- start: 00:36:33:15
  end: 00:36:40:09
  text_en: developing models of reasoning sort or another, whether it's how to manoeuvre in the world or how to
  text_ko: 추론 모델을 개발하는 데 집중되어 있었습니다.
- start: 00:36:40:11
  end: 00:36:46:19
  text_en: conduct proofs and verifications, efficiently. Regardless of where you were in the space,
  text_ko: AI 분야의 어느 위치에 있든,
- start: 00:36:46:19
  end: 00:36:49:24
  text_en: a lot of it was about, single or distributed reasoning.
  text_ko: 대부분 단일 추론이나 분산 추론에 관한 연구든,
- start: 00:36:50:01
  end: 00:36:56:01
  text_en: And so being able to find ways to have LLMs interact
  text_ko: 그래서 LLM이 지식 표현 방식, 지식 공학, 이러한 지식 구조에 대한
- start: 00:36:56:03
  end: 00:36:59:24
  text_en: with these other technologies of how you do knowledge representation, knowledge
  text_ko: 추론 방식 등 다른 기술들과 상호 작용할 수
- start: 00:36:59:24
  end: 00:37:02:12
  text_en: engineering, how you do inferencing
  text_ko: 있는 방법을 찾고,
- start: 00:37:02:12
  end: 00:37:07:07
  text_en: these knowledge structures, and building these kind
  text_ko: 이러한 지식 구조에 대한 추론을 수행하고,
- start: 00:37:07:07
  end: 00:37:11:06
  text_en: of deep connections between LLMs and LRMs on the one hand
  text_ko: 이러한 심층적인 연결을 구축하는 것이 중요합니다. 한편으로는 LLM과 LRM 사이에,
- start: 00:37:11:06
  end: 00:37:13:24
  text_en: and these other technologies on the other.
  text_ko: 연결을 구축하는 것이 중요합니다.
- start: 00:37:13:24
  end: 00:37:16:14
  text_en: I think is is currently
  text_ko: 제 생각에는 현재로서는 기회가 많은 분야 같습니다.
- start: 00:37:16:14
  end: 00:37:20:12
  text_en: at least a wide open space. So it's kind of the,
  text_ko: 그렇군요. 그러니까 모델의 데이터 기반 접근 방식과
