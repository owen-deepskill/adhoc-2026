  text_en: What is changing. But maybe it's more important to
  text_ko: 하지만 동시에 더 중요한 것은 무엇이 변하고 있는가 하는 점입니다. 어쩌면 변하지 않는 것이 무엇인지 묻는 것이
- start: 00:00:19:01
  end: 00:00:26:02
  text_en: ask what is not changing. As a human, We have used our rules of the logic
  text_ko: 점입니다. 어쩌면 변하지 않는 것이 무엇인지 묻는 것이 더 중요할지도 모릅니다. 인간은 오랫동안 논리적 규칙을 사용하여 사람들을 설득하고 결정을 내려왔습니다.
