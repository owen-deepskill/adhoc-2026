- start: 00:00:00:06
  end: 00:00:07:00
  text: "Today we are seeing teasing technical shift, \nespecially, after the advent\
    \ of the LLM."
- start: 00:00:07:02
  end: 00:00:09:19
  text: So many of us are struggling to find out what's the
- start: 00:00:09:19
  end: 00:00:13:03
  text: right way to adapt ourselves to the technological changes.
- start: 00:00:13:03
  end: 00:00:15:18
  text: But at the same time, what’s more important is
- start: 00:00:15:18
  end: 00:00:19:01
  text: What are changing. But maybe it's more important to
- start: 00:00:19:01
  end: 00:00:26:02
  text: 'ask what are not changing.

    As a human, We have used our rules of the logic'
- start: 00:00:26:02
  end: 00:00:29:14
  text: persuade and to make a decision to
- start: 00:00:29:14
  end: 00:00:32:00
  text: with a group of people. So we have been following
- start: 00:00:32:00
  end: 00:00:36:04
  text: these rules, rules of the logic, for last,
- start: 00:00:36:04
  end: 00:00:40:03
  text: "last 2000 years. \nAnd I found that there is exactly at the intersection"
- start: 00:00:40:03
  end: 00:00:42:20
  text: of these two philosophical in the technological approach.
- start: 00:00:43:00
  end: 00:00:44:18
  text: We found that there is an academic field
- start: 00:00:44:18
  end: 00:00:49:09
  text: called argumentation technology. And today we have the visionary,
- start: 00:00:49:11
  end: 00:00:53:18
  text: scholar in this field of research who is kind of researching into this,
- start: 00:00:53:18
  end: 00:00:58:11
  text: "into intersection. \nSo he had his vision is kind of provoke people's thoughts"
- start: 00:00:58:11
  end: 00:01:03:08
  text: "and to kind of how to enhance \ntheir critical thinking skills with the right\
    \ combination."
- start: 00:01:03:08
  end: 00:01:08:02
  text: "So, we have Professor Chris Reed \nfrom the University of Dundee"
- start: 00:01:08:02
  end: 00:01:12:09
  text: "Who is going to introduce his research and \nhow we can accommodate this\
    \ approach"
- start: 00:01:12:09
  end: 00:01:15:09
  text: into the real world application.
- start: 00:01:15:11
  end: 00:01:20:05
  text: "Thank you very much for that warm introduction, \nand thank you for welcoming\
    \ me here to"
- start: 00:01:20:07
  end: 00:01:23:04
  text: to join you.
- start: 00:01:23:06
  end: 00:01:25:11
  text: Perhaps we can start with your introduction.
- start: 00:01:25:12
  end: 00:01:27:12
  text: Just a brief introduction. What you have been working on
- start: 00:01:27:12
  end: 00:01:32:14
  text: "what you have in your research interest \nand why it matters these days."
- start: 00:01:32:16
  end: 00:01:36:24
  text: So, for the past, three decades, actually,
- start: 00:01:36:24
  end: 00:01:43:05
  text: I've been working on, AI modeling with a specific focus on
- start: 00:01:43:05
  end: 00:01:48:08
  text: "argumentation and human reasoning. \nSo trying to, understand the ways"
- start: 00:01:48:08
  end: 00:01:54:23
  text: in which people, produce well-reasoned, well-thought through,
- start: 00:01:54:23
  end: 00:02:00:03
  text: pieces of linguistic material. And so the focus is
- start: 00:02:00:03
  end: 00:02:15:12
  text: "very much on the performance of argumentation \nand the reaching of solidly\
    \ justified, decisions."
- start: 00:02:15:14
  end: 00:02:17:09
  text: with they express their disagreement and
- start: 00:02:17:09
  end: 00:02:19:22
  text: they come into conflict. And when they try to resolve
- start: 00:02:19:22
  end: 00:02:26:10
  text: "those conflicts into, into agreed, ways forward. \nThere are so many things\
    \ in, in play."
- start: 00:02:26:14
  end: 00:02:31:13
  text: So you have to integrate the the kind of face work
- start: 00:02:31:13
  end: 00:02:34:09
  text: and the politeness and all the social interaction material,
- start: 00:02:34:09
  end: 00:02:35:17
  text: because conflict is hard
- start: 00:02:35:17
  end: 00:02:37:18
  text: for people to manage.
- start: 00:02:37:18
  end: 00:02:44:07
  text: "With, the need for evidence for scrutiny. \nAnd so a kind of objectivity,"
- start: 00:02:44:13
  end: 00:02:49:09
  text: reliability, and all of that then interacts with the rest of the world and
    the evidence
- start: 00:02:49:09
  end: 00:02:53:16
  text: that's out there and the ability to test or not testing to refine
- start: 00:02:53:16
  end: 00:02:56:08
  text: "and so on. \nAnd so you have this,"
- start: 00:02:56:08
  end: 00:03:00:20
  text: this kind of nexus of all sorts of sophisticated human behavior.
- start: 00:03:00:20
  end: 00:03:06:12
  text: "That, that kind of comes together. \nSo there's a lot to handle if you want\
    \ to be able to,"
- start: 00:03:06:12
  end: 00:03:13:16
  text: "to model and then subsequently perhaps, critique or \nengage with or support\
    \ that human reasoning."
- start: 00:03:13:16
  end: 00:03:15:01
  text: So that's been my focus for a long time.
- start: 00:03:15:01
  end: 00:03:18:15
  text: And there has been a lot to do.
- start: 00:03:18:17
  end: 00:03:23:20
  text: "So, so yeah, so first of all, I mean, \none of the initial problems"
- start: 00:03:23:20
  end: 00:03:26:21
  text: "that we have is that although \nas you alluded to in your introduction,"
- start: 00:03:26:21
  end: 00:03:28:14
  text: argumentation theory as a discipline is
- start: 00:03:28:14
  end: 00:03:34:18
  text: "effectively more than 2000 year old, \n2000 years old, stretching right the\
    \ way back,"
- start: 00:03:34:18
  end: 00:03:40:20
  text: "to Aristotle and beyond. \nBut there's not a lot of what,"
- start: 00:03:40:20
  end: 00:03:44:22
  text: in the modern world, AI researchers would call data right?
- start: 00:03:44:22
  end: 00:03:47:14
  text: There's not a lot of rule.
- start: 00:03:47:14
  end: 00:03:51:14
  text: "Yeah. And this was a problem from very early on \nbecause there's a lot of,"
- start: 00:03:51:14
  end: 00:03:57:03
  text: "kind of 20th century philosophy, \nfocusing on the structure of argumentation."
- start: 00:03:57:03
  end: 00:03:59:03
  text: But most of that is conducted
- start: 00:03:59:03
  end: 00:04:03:12
  text: "in the analytical tradition of \nkind of reflecting on what must be true,"
- start: 00:04:03:12
  end: 00:04:09:15
  text: "rather than going out and seeing what actually is true, \nwhat people actually\
    \ argue."
- start: 00:04:09:17
  end: 00:04:14:01
  text: And that empirical term, is really only very, very recent.
- start: 00:04:14:01
  end: 00:04:16:04
  text: And so one of the things that
- start: 00:04:16:04
  end: 00:04:19:06
  text: we had to do, beyond was to go look at
- start: 00:04:19:06
  end: 00:04:24:21
  text: "how pㅈople argue. And that sounds kind of trivial, \nbut one of the, one\
    \ of the challenges is"
- start: 00:04:24:21
  end: 00:04:27:24
  text: if you want to do that, particularly in a computational setting,
- start: 00:04:28:01
  end: 00:04:30:10
  text: then you need tools. You need infrastructure.
- start: 00:04:30:11
  end: 00:04:35:02
  text: "You need to be able to bring that data together, \nto analyze it, to annotate\
    \ it."
- start: 00:04:35:04
  end: 00:04:40:13
  text: "And none of that existed. Right. \nSo so we kind of have to start from zero,"
- start: 00:04:40:13
  end: 00:04:44:19
  text: "start to build up the tool sets. \nThe analytical techniques,"
- start: 00:04:44:19
  end: 00:04:48:12
  text: the annotation guidelines drive all of that to the point
- start: 00:04:48:12
  end: 00:04:50:21
  text: at which we’re able to start collecting the data.
- start: 00:04:50:21
  end: 00:04:56:06
  text: "That took about a decade. \nAnd then and then indeed go out and"
- start: 00:04:56:06
  end: 00:04:59:10
  text: look at the way in which people argue in different domains,
- start: 00:04:59:10
  end: 00:05:03:07
  text: "because arguing is effectively ubiquitous \nacross the human experience."
- start: 00:05:03:07
  end: 00:05:06:03
  text: Right? So, whether you're a lawyer
- start: 00:05:06:03
  end: 00:05:12:14
  text: "in the courtroom or, husband and wife at home \narguing about who's going\
    \ to do the dishes."
- start: 00:05:12:19
  end: 00:05:15:15
  text: You know, the processes that we go through are
- start: 00:05:15:15
  end: 00:05:19:03
  text: very similar, right? There are commonalities
- start: 00:05:19:05
  end: 00:05:22:04
  text: across all of these different domains of argumentation.
- start: 00:05:22:06
  end: 00:05:25:05
  text: But then at the same time, there are also subtleties,
- start: 00:05:25:07
  end: 00:05:28:05
  text: of huge differences between how people argue
- start: 00:05:28:05
  end: 00:05:30:24
  text: in the corporate boardroom as opposed to
- start: 00:05:31:03
  end: 00:05:35:06
  text: "trying to do. Yeah, exactly. \nSo so we had to go and get a"
- start: 00:05:35:06
  end: 00:05:38:05
  text: lot of data from all these different domains.
- start: 00:05:38:07
  end: 00:05:43:03
  text: And apply consistent annotation techniques to be able to
- start: 00:05:43:03
  end: 00:05:51:00
  text: "build up large corpora \nand then start to build the systems, based on, those\
    \ data sets."
- start: 00:05:51:00
  end: 00:05:53:20
  text: And so effectively, what happened over the course of,
- start: 00:05:53:20
  end: 00:05:56:21
  text: as I say, several decades, was this emergence of
- start: 00:05:56:21
  end: 00:06:01:19
  text: "an ecosystem of different tools and data sets \nand techniques of algorithms."
- start: 00:06:01:19
  end: 00:06:06:18
  text: "And then about ten years ago, \nwhat happened was that we realized that"
- start: 00:06:06:18
  end: 00:06:10:23
  text: "with the advent of new AI and subsequently, \nnot long subsequently,"
- start: 00:06:10:23
  end: 00:06:18:18
  text: with large language models, that we start to have the techniques for being
    able to automatically recognize the
- start: 00:06:18:18
  end: 00:06:25:11
  text: "structured reasoning in natural text. \nSo we also started developing rhythms"
- start: 00:06:25:11
  end: 00:06:30:05
  text: for that, driven in large part by those datasets.
- start: 00:06:30:07
  end: 00:06:35:11
  text: "So the problem is that, as of today, \nat the beginning of 2026,"
- start: 00:06:35:11
  end: 00:06:43:06
  text: "the state of the art is still not able  to cope \nwith the sophistication"
- start: 00:06:43:06
  end: 00:06:51:06
  text: "and the nuance, and the kind of \nmastery of human cognition that is embodied"
- start: 00:06:51:06
  end: 00:06:55:06
  text: in the process of argumentation. So LLM is out of the box.
- start: 00:06:55:06
  end: 00:07:02:05
  text: Are really so very poor at recognizing when people are giving, pieces of evidence
- start: 00:07:02:05
  end: 00:07:06:00
  text: for their conclusions, how they, assemble
- start: 00:07:06:00
  end: 00:07:09:03
  text: the chains of reasoning to be able to support
- start: 00:07:09:05
  end: 00:07:13:15
  text: 'or dis confirm hypotheses.

    So, we had a very'
- start: 00:07:13:15
  end: 00:07:18:20
  text: "interesting, turning point. \nSo, that as there is this"
- start: 00:07:18:20
  end: 00:07:25:13
  text: "kind of inexorable rise in the power \nand sophistication, of modern day,"
- start: 00:07:25:14
  end: 00:07:28:12
  text: I say formally, yeah. And more latterly,
- start: 00:07:28:14
  end: 00:07:34:14
  text: large reasoning models, algorithms. There is a fundamental, limit.
- start: 00:07:34:14
  end: 00:07:40:03
  text: It seems to, the ability of these AI systems on their own
- start: 00:07:40:03
  end: 00:07:43:06
  text: like that to be able to tackle.
- start: 00:07:43:06
  end: 00:07:47:04
  text: So argument technology is, is now at this,
- start: 00:07:47:04
  end: 00:07:52:08
  text: at this sort of fascinating, eye of the storm.
- start: 00:07:52:10
  end: 00:08:00:23
  text: "In, in as much as, reasoning is being touted \nand seems indeed to be, of\
    \ core importance and"
- start: 00:08:00:23
  end: 00:08:04:18
  text: fundamental importance to what AI is able to do.
- start: 00:08:04:18
  end: 00:08:10:17
  text: And yet even just the ability to measure the sophistication and
- start: 00:08:10:18
  end: 00:08:15:04
  text: capability that LLM requires all of this argument technology
- start: 00:08:15:06
  end: 00:08:17:06
  text: work that we'll be doing over the next few years.
- start: 00:08:17:12
  end: 00:08:21:19
  text: "So it's a very exciting moment in time \nto be working on presenting these\
    \ things."
- start: 00:08:22:00
  end: 00:08:24:12
  text: Yeah, precisely. Yeah. So before we kind of
- start: 00:08:24:12
  end: 00:08:28:14
  text: "diving into a bit more technical details, \nI just wonder, you mentioned\
    \ briefly mentioned"
- start: 00:08:28:14
  end: 00:08:31:20
  text: about your work. Just wonder how your work
- start: 00:08:31:20
  end: 00:08:37:09
  text: "have been applied to the different projects \nlike in public sector or any\
    \ other sectors."
- start: 00:08:37:11
  end: 00:08:42:09
  text: And based on that in my sort of final question is why it matters,
- start: 00:08:42:09
  end: 00:08:45:03
  text: "to the human. \nSo that's I mean,"
- start: 00:08:45:03
  end: 00:08:47:13
  text: I think that those two questions naturally go.
- start: 00:08:47:13
  end: 00:08:51:22
  text: So one of the things that I've been particularly interested in, is
- start: 00:08:51:22
  end: 00:08:57:19
  text: how we can take, AI research into this kind of ubiquitous,
- start: 00:08:57:21
  end: 00:09:04:16
  text: "phenomenon of argumentation and \napply it in different domains to have some\
    \ kind of impact."
- start: 00:09:04:16
  end: 00:09:06:15
  text: Now, having an impact is always hard, right?
- start: 00:09:06:15
  end: 00:09:11:19
  text: "you have to have a lot of track record. \nKind of perseverance to"
- start: 00:09:11:19
  end: 00:09:15:12
  text: "be able to make a difference. \nBut we've had at least some,"
- start: 00:09:15:12
  end: 00:09:18:15
  text: some kind of small successes, as you say.
- start: 00:09:18:15
  end: 00:09:20:22
  text: Some in the public sector and some elsewhere.
- start: 00:09:21:03
  end: 00:09:24:10
  text: So I can I can talk to you about a couple of examples.
- start: 00:09:24:10
  end: 00:09:29:05
  text: "So we've had a long relationship, \nwith the BBC and the UK,"
- start: 00:09:29:05
  end: 00:09:34:13
  text: which started off, in a collaboration with BBC radio four and
- start: 00:09:34:13
  end: 00:09:40:05
  text: "in particular the, production team, \nof a program called The Moral Maze,"
- start: 00:09:40:08
  end: 00:09:47:00
  text: which, if anyone is interested in, in reasoning and its applications in topical
    problems,
- start: 00:09:47:05
  end: 00:09:54:04
  text: "I thoroughly recommend the romance. \nAnd the set up there is a rather combative,"
- start: 00:09:54:04
  end: 00:09:59:17
  text: rather belligerent, interaction between four kind of regular panelists.
- start: 00:09:59:17
  end: 00:10:08:24
  text: "Four witnesses who are experts on \nthe theme of the week's show, which is\
    \ drawn from recent news."
- start: 00:10:09:01
  end: 00:10:13:01
  text: And the idea is that the witnesses are cross-examined by the panelists.
- start: 00:10:13:03
  end: 00:10:16:21
  text: So it's a very nice, kind of set up for
- start: 00:10:16:21
  end: 00:10:21:14
  text: "exploring how people argue and \nhow they express confidence and how they\
    \ reach agreement."
- start: 00:10:21:14
  end: 00:10:28:00
  text: "So, we started working with them \nto try to understand just some of the\
    \ basic"
- start: 00:10:28:00
  end: 00:10:36:04
  text: mechanisms of how, interactional argumentation, functions, how it was put
    together.
- start: 00:10:36:06
  end: 00:10:41:12
  text: So, we first of all, transcribed and then
- start: 00:10:41:12
  end: 00:10:47:01
  text: analyzed, in total many of their programs.
- start: 00:10:47:01
  end: 00:10:49:22
  text: I mean, I think maybe 30 or 45 episodes.
- start: 00:10:49:23
  end: 00:10:55:13
  text: "And a lot of that was preliminary work and try and \njust understand what\
    \ it meant to"
- start: 00:10:55:13
  end: 00:11:01:17
  text: be able to annotate, and as we built up the data set,
- start: 00:11:01:17
  end: 00:11:07:02
  text: we started to get fascinating insights into the ways in which the dynamics
- start: 00:11:07:02
  end: 00:11:13:13
  text: "of this kind of drive, are structured. \nSo, for example, we were looking\
    \ at the,"
- start: 00:11:13:14
  end: 00:11:17:05
  text: the ways in which, turn taking interacts
- start: 00:11:17:05
  end: 00:11:23:06
  text: with the presentation of ideas, how questioning, sets up themes
- start: 00:11:23:06
  end: 00:11:26:12
  text: that then run through the remainder of the program and so on and so forth.
- start: 00:11:26:14
  end: 00:11:28:19
  text: And one of the things that we realized very
- start: 00:11:28:19
  end: 00:11:32:04
  text: early on was that there is just a lot of data,
- start: 00:11:32:06
  end: 00:11:35:11
  text: right? So, you know, in 45 minutes of program,
- start: 00:11:35:11
  end: 00:11:37:03
  text: you've got maybe 10,000 words.
- start: 00:11:37:03
  end: 00:11:40:00
  text: You've got, I don't know, 500 terms yet.
- start: 00:11:40:00
  end: 00:11:45:17
  text: So you've got a lot of kind of very complicated linguistic material that would
    interacting and,
- start: 00:11:45:17
  end: 00:11:48:19
  text: you know, beloved of people who work in argumentation theory of
- start: 00:11:48:19
  end: 00:11:51:10
  text: these kind of box and arrow diagrams that connect up
- start: 00:11:51:15
  end: 00:11:54:19
  text: premises and conclusions. And they are certainly very
- start: 00:11:54:19
  end: 00:11:57:22
  text: "useful and very informative. \nBut when, when you've got like"
- start: 00:11:57:22
  end: 00:12:00:21
  text: thousands of boxes of arrows, it just turns into complete spaghetti.
- start: 00:12:00:21
  end: 00:12:04:03
  text: So you need other ways of kind of
- start: 00:12:04:03
  end: 00:12:06:24
  text: "presenting that information. \nSo we started to develop a"
- start: 00:12:06:24
  end: 00:12:12:03
  text: "series of analytics that give you insight \ninto that abstraction through\
    \ different"
- start: 00:12:12:03
  end: 00:12:17:16
  text: "kind of abstraction mechanisms. \nAnd so being able to show,"
- start: 00:12:17:16
  end: 00:12:19:23
  text: for example, where there are kind of conflict
- start: 00:12:19:23
  end: 00:12:25:11
  text: hotspots and how those interact on the turn that
- start: 00:12:25:13
  end: 00:12:27:02
  text: Exactly, exactly.
- start: 00:12:27:04
  end: 00:12:29:24
  text: And so, you know, the lessons that we learned there,
- start: 00:12:29:24
  end: 00:12:33:14
  text: we were then able to take back to the production team and say
- start: 00:12:33:14
  end: 00:12:35:16
  text: look, we we've got these, these kinds of
- start: 00:12:35:16
  end: 00:12:39:21
  text: "observations about what's going on. \nAnd they said, that's cool."
- start: 00:12:39:21
  end: 00:12:42:21
  text: How can we how can we get that to our audience?
- start: 00:12:42:21
  end: 00:12:46:24
  text: "Right? How can we get that insight \ninto understanding the discussion?"
- start: 00:12:47:01
  end: 00:12:50:04
  text: "And it's not just about, you know, who's winning, \nbut rather about"
- start: 00:12:50:04
  end: 00:12:53:11
  text: who's presenting arguments that are well defended.
- start: 00:12:53:11
  end: 00:12:59:16
  text: "And who's able to to dig down the position, \nand defend it against all comers\
    \ as opposed"
- start: 00:12:59:16
  end: 00:13:03:09
  text: to capitulate or indeed, who's got the best brass
- start: 00:13:03:10
  end: 00:13:07:21
  text: or in these kinds of rather soft, notions? Yeah.
- start: 00:13:07:22
  end: 00:13:10:16
  text: Can now be, evidence drawn.
- start: 00:13:10:16
  end: 00:13:14:12
  text: "Data driven? Yeah. \nAnd so we worked with them,"
- start: 00:13:14:12
  end: 00:13:19:18
  text: to produce these analytics, live with the program
- start: 00:13:19:18
  end: 00:13:22:13
  text: so that they were... Exactly.
- start: 00:13:22:17
  end: 00:13:25:22
  text: And all of those analytics are at least at the moment.
- start: 00:13:25:24
  end: 00:13:31:03
